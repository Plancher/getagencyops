<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agency Reporting Diagnostic — Free Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700;900&family=Roboto+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #000000;
  --orange: #FCA311;
  --font-headline: 'Inconsolata', monospace;
  --font-sub: 'Roboto Mono', monospace;
  --font-body: 'Josefin Sans', sans-serif;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--black);
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.025;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px;
}

.page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  text-align: center;
}

.tag {
  font-family: var(--font-sub);
  font-style: italic;
  font-size: 0.82rem;
  color: var(--orange);
  letter-spacing: 0.1em;
  margin-bottom: 14px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.1s forwards;
}

h1 {
  font-family: var(--font-headline);
  font-weight: 900;
  font-size: clamp(1.6rem, 4.5vw, 2.8rem);
  color: #fff;
  margin-bottom: 10px;
  max-width: 780px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.2s forwards;
}
h1 span { color: var(--orange); }

.subtitle {
  font-family: var(--font-sub);
  font-style: italic;
  font-size: clamp(0.78rem, 1.4vw, 0.9rem);
  color: #666;
  margin-bottom: 28px;
  max-width: 520px;
  line-height: 1.5;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.3s forwards;
}

.video-wrap {
  width: 100%;
  max-width: 560px;
  position: relative;
  background: #111;
  border: 2px solid #222;
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.3s ease;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.4s forwards;
}
.video-wrap:hover { border-color: var(--orange); }
.video-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(252,163,17,0.06) 0%, transparent 60%);
}
.video-play {
  width: 56px; height: 56px;
  background: var(--orange);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 0 0 0 rgba(252,163,17,0.4);
}
.video-wrap:hover .video-play {
  transform: scale(1.1);
  box-shadow: 0 0 0 14px rgba(252,163,17,0.1);
}
.video-play svg { width: 24px; height: 24px; margin-left: 3px; }
.video-label {
  position: absolute;
  bottom: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-sub);
  font-size: 0.7rem;
  color: #444;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.btn {
  display: inline-block;
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.04em;
  padding: 18px 44px;
  background: var(--orange);
  color: var(--black);
  text-decoration: none;
  border: 2px solid var(--black);
  cursor: pointer;
  transition: all 0.25s ease;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.55s forwards;
}
.btn:hover {
  background: var(--black);
  color: var(--orange);
  transform: translateY(-2px);
  box-shadow: 4px 4px 0 var(--orange);
  border-color: var(--orange);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  h1 { font-size: 1.45rem; }
  .video-wrap { margin-bottom: 24px; }
  .video-play { width: 48px; height: 48px; }
  .video-play svg { width: 20px; height: 20px; }
  .btn { padding: 14px 28px; font-size: 0.88rem; width: 100%; text-align: center; }
}
</style>
</head>
<body>

<div class="page">
  <p class="tag">Free Diagnostic for Lead Gen Agency Owners</p>
  <h1>Find Out Where Your Reporting Is <span>Costing You Clients</span></h1>
  <p class="subtitle">25 yes-or-no questions. 15 minutes. You'll know exactly where the gaps are.</p>

  <div class="video-wrap">
    <div class="video-overlay"></div>
    <div class="video-play">
      <svg viewBox="0 0 24 24" fill="none"><polygon points="6,3 20,12 6,21" fill="#000"/></svg>
    </div>
    <span class="video-label">See what good reporting looks like</span>
  </div>

  <a href="https://www.notion.so/32634cba052e8119bee5dd1be80380fc" target="_blank" class="btn">Get the Free Checklist</a>
</div>

</body>
</html>
