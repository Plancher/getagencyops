<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Your Leak Mapping Session</title>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700;900&family=Roboto+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #000000;
  --orange: #FCA311;
  --font-headline: 'Inconsolata', monospace;
  --font-sub: 'Roboto Mono', monospace;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--black);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.025;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px;
}

.page {
  width: 100%;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 60px;
}

h1 {
  font-family: var(--font-headline);
  font-weight: 900;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: #fff;
  text-align: center;
  margin-bottom: 8px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.1s forwards;
}
h1 span { color: var(--orange); }

.subtitle {
  font-family: var(--font-sub);
  font-style: italic;
  font-size: clamp(0.75rem, 1.3vw, 0.88rem);
  color: #666;
  text-align: center;
  margin-bottom: 36px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.25s forwards;
}

.cal-wrap {
  width: 100%;
  max-width: 900px;
  background: #fff;
  border: 2px solid var(--orange);
  padding: 4px;
  flex: 1;
  min-height: 600px;
  opacity: 0;
  animation: fadeUp 0.5s ease 0.4s forwards;
}

#my-cal-inline-leak-mapping-session {
  width: 100%;
  height: 100%;
  min-height: 600px;
  overflow: auto;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .page { padding: 32px 16px 40px; }
  .cal-wrap { min-height: 500px; }
}
</style>
</head>
<body>

<div class="page">
  <h1>Book Your <span>Leak Mapping Session</span></h1>
  <p class="subtitle">Pick a time. We'll show you exactly where the gaps are.</p>
  <div class="cal-wrap">
    <div id="my-cal-inline-leak-mapping-session" style="width:100%;height:100%;overflow:auto;"></div>
  </div>
</div>

<script type="text/javascript">
(function (C, A, L) {
  let p = function (a, ar) { a.q.push(ar); };
  let d = C.document;
  C.Cal = C.Cal || function () {
    let cal = C.Cal;
    let ar = arguments;
    if (!cal.loaded) {
      cal.ns = {};
      cal.q = cal.q || [];
      d.head.appendChild(d.createElement("script")).src = A;
      cal.loaded = true;
    }
    if (ar[0] === L) {
      const api = function () { p(api, arguments); };
      const namespace = ar[1];
      api.q = api.q || [];
      if (typeof namespace === "string") {
        cal.ns[namespace] = cal.ns[namespace] || api;
        p(cal.ns[namespace], ar);
        p(cal, ["initNamespace", namespace]);
      } else p(cal, ar);
      return;
    }
    p(cal, ar);
  };
})(window, "https://app.cal.com/embed/embed.js", "init");

Cal("init", "leak-mapping-session", {origin:"https://app.cal.com"});
Cal.ns["leak-mapping-session"]("inline", {
  elementOrSelector: "#my-cal-inline-leak-mapping-session",
  config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
  calLink: "silas-voglmaier-test/leak-mapping-session",
});
Cal.ns["leak-mapping-session"]("ui", {
  "cssVarsPerTheme": {
    "light": {"cal-brand":"#000000"},
    "dark": {"cal-brand":"#FCA311"}
  },
  "hideEventTypeDetails": false,
  "layout": "month_view"
});
</script>

</body>
</html>
